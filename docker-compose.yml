services:
  betterme:
    build: .
    container_name: betterme
    image: betterme:v1
    ports:
      - "8080:8080"
    restart: always
  rabbitmq:
    image: rabbitmq:4-management
    container_name: rabbitmq-server
    ports:
      - "5672:5672"
      - "15672:15672"
    environment:
      - RABBITMQ_DEFAULT_USER=admin
      - RABBITMQ_DEFAULT_PASS=admin123
    volumes:
      - rabbitmq_data:/var/lib/rabbitmq
volumes:
  rabbitmq_data: